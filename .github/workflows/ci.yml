name: C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ python3
    
    - name: Compile echo client
      run: g++ -Wall -Wextra echo_client.cpp -o echo_client
    
    - name: Run echo test
      run: |
        python3 echo_server.py &
        SERVER_PID=$!
        sleep 2
        ./echo_client
        CLIENT_EXIT=$?
        kill $SERVER_PID
        exit $CLIENT_EXIT